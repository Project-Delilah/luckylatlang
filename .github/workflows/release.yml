name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: deployment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep -m1 'version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          VERSION_CODE=$(grep -m1 'version:' pubspec.yaml | sed 's/.*+//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Get short commit SHA
        id: sha
        run: echo "SHA=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Get full commit message
        id: commit
        run: echo "MESSAGE=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT

      - name: Configure signing
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=../../keystore/release-key.jks" >> android/key.properties
          echo "=== Keystore Debug ==="
          cat android/key.properties
          echo "======================="

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --split-per-abi --release

      - name: Rename APKs
        id: rename
        run: |
          cd build/app/outputs/flutter-apk
          DT=$(date +%Y%m%d_%H%M)
          echo "DT=$DT" >> $GITHUB_OUTPUT
          for f in app-*-release.apk; do
            ARCH=$(echo "$f" | sed 's/app-\(.*\)-release\.apk/\1/')
            mv "$f" "luckylatlang_${ARCH}_${DT}-signed.apk"
          done
          ls -la

      - name: Update OTA release.json
        env:
          OTA_TOKEN: ${{ secrets.OTA_REPO_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          SHA: ${{ steps.sha.outputs.SHA }}
          DT: ${{ steps.rename.outputs.DT }}
          COMMIT_MSG: ${{ steps.commit.outputs.MESSAGE }}
        run: |
          cd build/app/outputs/flutter-apk

          # Compute SHA-256 for each arch APK
          export SHA_ARM64=$(sha256sum "luckylatlang_arm64-v8a_${DT}-signed.apk"   | cut -d' ' -f1)
          export SHA_ARM=$(sha256sum   "luckylatlang_armeabi-v7a_${DT}-signed.apk" | cut -d' ' -f1)
          export SHA_X86=$(sha256sum   "luckylatlang_x86_64_${DT}-signed.apk"      | cut -d' ' -f1)

          # Clone ota_updates repo
          git clone "https://x-access-token:${OTA_TOKEN}@github.com/Project-Delilah/ota_updates.git" /tmp/ota

          python3 - << 'PYEOF'
import json, os
from pathlib import Path

version      = os.environ['VERSION']
version_code = int(os.environ['VERSION_CODE'])
sha          = os.environ['SHA']
dt           = os.environ['DT']
tag          = f"v{version}-{sha}"
base         = f"https://github.com/Project-Delilah/luckylatlang/releases/download/{tag}"

new_release = {
    "versionCode":   version_code,
    "version":       version,
    "changelog":     os.environ.get('COMMIT_MSG', ''),
    "forceRollback": False,
    "apks": {
        "arm64-v8a":   {"url": f"{base}/luckylatlang_arm64-v8a_{dt}-signed.apk",   "sha256": os.environ['SHA_ARM64']},
        "armeabi-v7a": {"url": f"{base}/luckylatlang_armeabi-v7a_{dt}-signed.apk", "sha256": os.environ['SHA_ARM']},
        "x86_64":      {"url": f"{base}/luckylatlang_x86_64_{dt}-signed.apk",       "sha256": os.environ['SHA_X86']},
    },
}

# Rotate current release into rollback (one level deep — no stacking)
prev_path = Path("/tmp/ota/release.json")
if prev_path.exists():
    prev = json.loads(prev_path.read_text())
    prev.pop("rollback", None)
    prev.pop("forceRollback", None)
    new_release["rollback"] = prev

Path("/tmp/ota/release.json").write_text(json.dumps(new_release, indent=2))
print(f"release.json written: v{version}+{version_code}")
PYEOF

          cd /tmp/ota
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add release.json
          git commit -m "release: v${VERSION}+${VERSION_CODE} (${SHA})"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}-${{ steps.sha.outputs.SHA }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            **Commit:** ${{ steps.sha.outputs.SHA }}
            **Message:** ${{ steps.commit.outputs.MESSAGE }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/luckylatlang_*-signed.apk
